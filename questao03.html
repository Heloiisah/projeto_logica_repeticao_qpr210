<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questão 03</title>
    <script src="js/script03.js" defer></script>
</head>
<body>
    <div id="geral">
        <h3>Doação de Sangue (Cadastro de 12 pessoas)</h3>
        
        <p>Pessoa atual: <span id="contador-pessoa">1</span>/12</p>
        
        <label for="idade">Idade:</label>
        <input type="number" id="idade">
        <br><br>
        
        <label for="peso">Peso (kg):</label>
        <input type="number" id="peso" step="0.1">
        <br><br>
        
        <button id="btn-registrar">Registrar Pessoa</button>
        <br><br>
        
        <div id="resultado-atual"></div>
        <br>
        <div id="resultado-final"></div>
    </div>
</body>
</html>
