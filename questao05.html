<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questão 05</title>
    <script src="js/script05.js" defer></script>
</head>
<body>
    <div id="geral">
        <h3>Pesquisa de Habitantes</h3>
        
        <p>Pessoas cadastradas: <span id="contador-pessoa">0</span></p>
        
        <label for="idade">Idade:</label>
        <input type="number" id="idade">
        <br><br>
        
        <label for="sexo">Sexo:</label>
        <select id="sexo">
            <option value="M">Masculino</option>
            <option value="F">Feminino</option>
        </select>
        <br><br>

        <label for="renda">Renda (R$):</label>
        <input type="number" id="renda" step="0.01">
        <br><br>
        
        <button id="btn-registrar">Registrar Pessoa</button>
        <button id="btn-finalizar">Finalizar Pesquisa</button>
        <br><br>
        
        <div id="resultado-atual"></div>
        <div id="resultado"></div>
    </div>
</body>
</html>
